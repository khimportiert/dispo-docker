services:

  ors:
    image: openrouteservice/openrouteservice:v9.8.0
    container_name: ors
    restart: unless-stopped
    ports:
      - "8080:8082" # von außen erreichbar auf Port 8080
    volumes:
      - ./ors/config:/home/ors/config
      - ./ors/data:/home/ors/files
    environment:
      REBUILD_GRAPHS: False # Set to True to rebuild graphs on container start.
      CONTAINER_LOG_LEVEL: INFO
      XMS: 4g
      XMX: 16g
      ADDITIONAL_JAVA_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8082/ors/v2/health || exit 1
      start_period: 1m
      interval: 10s
      timeout: 2s
      retries: 3
      disable: false
    networks:
      - backend

  dicebear:
    image: dicebear/api:3
    container_name: dicebear
    restart: unless-stopped
    ports:
      - "3021:3021"
    environment:
      - PORT=3021
    tmpfs:
      - '/run'
      - '/tmp'
    networks:
      - backend

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dispo
      POSTGRES_PASSWORD: downyx-fawWo5-rogjaw
      POSTGRES_DB: DispoDB
    ports:
      - "5432:5432" # nur wenn ASP.NET extern (außerhalb Docker) läuft
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
